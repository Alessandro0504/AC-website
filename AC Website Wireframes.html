<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>AC — Website Wireframes</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Source+Serif+4:ital,opsz,wght@0,8..60,300..700;1,8..60,300..700&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  html, body { margin: 0; padding: 0; background: #ede9df; font-family: 'Inter', system-ui, sans-serif; }
  * { box-sizing: border-box; }
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="design-canvas.jsx"></script>
<script type="text/babel" src="wireframes/wire-kit.jsx"></script>
<script type="text/babel" src="wireframes/page-context.jsx"></script>
<script type="text/babel" src="wireframes/page-home-a.jsx"></script>
<script type="text/babel" src="wireframes/page-home-b.jsx"></script>
<script type="text/babel" src="wireframes/page-home-c.jsx"></script>
<script type="text/babel" src="wireframes/page-inner.jsx"></script>
<script type="text/babel" src="wireframes/page-about-cases.jsx"></script>

<script type="text/babel" data-presets="react">
function App() {
  return (
    <DesignCanvas title="AC — Website · Wireframes R01" subtitle="Greyscale structure. Palette + photography applied after lock-in.">
      <DCSection id="context" title="00 · Direction">
        <DCArtboard id="ctx" label="Direction & structure" width={1280} height={780}>
          <ContextSheet />
        </DCArtboard>
      </DCSection>

      <DCSection id="home" title="01 · Home — 3 variations">
        <DCArtboard id="home-a" label="A · Editorial Magazine" width={1280} height={2680}>
          <HomeA />
        </DCArtboard>
        <DCArtboard id="home-b" label="B · Ledger Dossier" width={1280} height={2580}>
          <HomeB />
        </DCArtboard>
        <DCArtboard id="home-c" label="C · Atlas Cover" width={1280} height={3060}>
          <HomeC />
        </DCArtboard>
      </DCSection>

      <DCSection id="portfolio" title="02 · Portfolio">
        <DCArtboard id="portfolio" label="Product Portfolio" width={1280} height={2000}>
          <PortfolioPage />
        </DCArtboard>
      </DCSection>

      <DCSection id="track" title="03 · Track Record">
        <DCArtboard id="track" label="Verified Track Record" width={1280} height={2000}>
          <TrackRecordPage />
        </DCArtboard>
      </DCSection>

      <DCSection id="network" title="04 · Network">
        <DCArtboard id="network" label="Global Network" width={1280} height={2100}>
          <NetworkPage />
        </DCArtboard>
      </DCSection>

      <DCSection id="cases" title="05 · Case Studies">
        <DCArtboard id="cases" label="Selected Casework" width={1280} height={1960}>
          <CaseStudiesPage />
        </DCArtboard>
      </DCSection>

      <DCSection id="about" title="06 · About & Contact">
        <DCArtboard id="about" label="About & Contact" width={1280} height={1900}>
          <AboutContactPage />
        </DCArtboard>
      </DCSection>
    </DesignCanvas>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
